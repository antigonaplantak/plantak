name: Plantak CI

on:
  push:
    branches:
      - main
      - dev
      - freeze/**
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify API (Node 22 + pnpm)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: plantak
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d plantak"
          --health-interval=2s
          --health-timeout=3s
          --health-retries=30

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=2s
          --health-timeout=3s
          --health-retries=30

    env:
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://app:app@localhost:5432/plantak?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_access_secret
      JWT_REFRESH_SECRET: ci_refresh_secret
        AUTH_CODE_PEPPER: ci_magic_pepper
      JWT_ACCESS_TTL_MIN: 15
      JWT_REFRESH_TTL_DAYS: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm -C apps/api exec prisma generate

      - name: Prisma migrate deploy
        run: pnpm -C apps/api exec prisma migrate deploy

      - name: Lint
        run: pnpm -C apps/api exec eslint "src/**/*.ts" "test/**/*.ts"

      - name: Unit tests
        run: pnpm -C apps/api test -- --runInBand --detectOpenHandles

      - name: Build
        run: pnpm -C apps/api run build

      - name: Queue alerts
        run: pnpm -C apps/api run ops:queue:alerts

      - name: Observability proof
        run: pnpm -C apps/api run ops:observability:proof

      - name: Booking gate
        run: pnpm -C apps/api run gate:bookings

  docker_build:
    name: Docker build (when Dockerfile exists)
    runs-on: ubuntu-latest
    needs: [verify]
    if: ${{ hashFiles('apps/api/Dockerfile') != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build api image
        run: docker build -t plantak-api:ci -f apps/api/Dockerfile .
