name: Plantak CI

on:
  push:
    branches:
      - main
      - dev
      - freeze/**
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify API (Node 22 + pnpm)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: plantak
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d plantak"
          --health-interval=2s
          --health-timeout=3s
          --health-retries=30

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=2s
          --health-timeout=3s
          --health-retries=30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://app:app@localhost:5432/plantak?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_access_secret
      JWT_REFRESH_SECRET: ci_refresh_secret
      AUTH_CODE_PEPPER: ci_magic_pepper
      JWT_ACCESS_TTL_MIN: 15
      JWT_REFRESH_TTL_DAYS: 30
      PAYMENT_WEBHOOK_SECRET: ci_payment_webhook_secret

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm via Corepack
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack prepare pnpm@10.30.2 --activate
          pnpm --version

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm -C apps/api exec prisma generate

      - name: Prisma migrate deploy
        run: pnpm -C apps/api exec prisma migrate deploy

      - name: Lint
        run: pnpm -C apps/api exec eslint "src/**/*.ts" "test/**/*.ts"

      - name: Unit tests
        run: pnpm -C apps/api exec jest --runInBand --detectOpenHandles --passWithNoTests

      - name: Build
        run: pnpm -C apps/api run build

      - name: Queue alerts
        run: pnpm -C apps/api run ops:queue:alerts

      - name: Observability proof
        run: pnpm -C apps/api run ops:observability:proof

      - name: Booking gate + payments proof stack
        run: |
          pnpm -C apps/api run gate:bookings

          lsof -ti :3001 | xargs -r kill -9
          sleep 2

          nohup env PAYMENT_WEBHOOK_SECRET="$PAYMENT_WEBHOOK_SECRET" pnpm -C apps/api start > /tmp/plantak_api_after_gate.log 2>&1 &
          echo $! > /tmp/plantak_api_after_gate.pid

          for i in $(seq 1 40); do
            if curl -fsS http://localhost:3001/api/health >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://localhost:3001/api/health
          pnpm -C apps/api run proof:payments:stack

      - name: Stop API after payments proof stack
        if: always()
        run: |
          if [ -f /tmp/plantak_api_after_gate.pid ]; then
            kill "$(cat /tmp/plantak_api_after_gate.pid)" || true
          fi
          pkill -f "nest start|node dist/main|pnpm start" || true

  docker_build:
    name: Docker build (when Dockerfile exists)
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - uses: actions/checkout@v5

      - name: Check Dockerfile
        id: dockerfile
        run: |
          if [ -f apps/api/Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build api image
        if: steps.dockerfile.outputs.exists == 'true'
        run: docker build -t plantak-api:ci -f apps/api/Dockerfile .
